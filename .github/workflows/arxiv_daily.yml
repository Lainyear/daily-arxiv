name: 每日ArXiv论文中文日报
on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1点 = 北京时间早上9点自动发送
  workflow_dispatch: # 支持手动一键测试

jobs:
  run_daily_arxiv:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目完整代码
        uses: actions/checkout@v4

      - name: 配置最新Python3.12环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装全部运行依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 云端写入DeepSeek私密API密钥
        run: echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env

      - name: 抓取arXiv论文 + DeepSeek生成中文精简摘要
        run: python main.py

      # 🔴 新增：统一路径，方便邮件读取
      - name: 复制报告到固定路径
        run: |
          # 把生成的带日期的报告复制成固定文件名，方便邮件读取
          cp data/summaries/report_*.md data/daily_summary.md

      - name: 全自动发送日报到你的QQ邮箱
        run: |
          python <<EOF
          import smtplib
          from email.mime.text import MIMEText
          from email.utils import formataddr
          from datetime import datetime

          # 读取GitHub云端加密邮箱配置
          sender = "${{ secrets.EMAIL_FROM }}"
          receiver = "${{ secrets.EMAIL_TO }}"
          auth_code = "${{ secrets.EMAIL_AUTH_CODE }}"
          today = datetime.now().strftime("%Y-%m-%d")

          # 读取生成好的论文日报内容（现在路径匹配了！）
          try:
              with open("data/daily_summary.md", "r", encoding="utf-8") as f:
                  paper_content = f.read()
          except Exception as e:
              print(f"读取文件失败: {e}")
              paper_content = "今日暂无最新相关arXiv前沿论文更新"

          # 配置邮件格式
          mail_title = f"📅 {today} arXiv LLM/Agent 中文论文日报"
          msg = MIMEText(paper_content, 'plain', 'utf-8')
          msg['From'] = formataddr(('ArXiv论文订阅', sender))
          msg['To'] = receiver
          msg['Subject'] = mail_title

          # QQ邮箱国内SMTP通道发送
          smtp_server = smtplib.SMTP_SSL('smtp.qq.com', 465)
          smtp_server.login(sender, auth_code)
          smtp_server.sendmail(sender, receiver, msg.as_string())
          smtp_server.quit()
          print("✅ 邮箱论文日报推送成功！")
          EOF

      # 🔴 新增：上传生成的报告到Actions Artifacts，跑完可以下载
      - name: 上传日报文件
        uses: actions/upload-artifact@v4
        with:
          name: daily-arxiv-report
          path: |
            data/summaries/
            data/daily_summary.md
          retention-days: 7  # 保留7天，方便你下载查看
