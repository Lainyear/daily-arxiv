name: 每日ArXiv论文中文日报
on:
  schedule:
    - cron: '0 1 * * *'  # 每日北京时间 09:00 自动执行
  workflow_dispatch:  # 支持手动一键运行测试

jobs:
  run_daily_arxiv:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 写入API密钥
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env

      - name: 执行论文抓取与总结
        run: python main.py
