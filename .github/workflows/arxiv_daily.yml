name: 每日ArXiv论文中文日报
on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1点 = 北京时间早上9点
  workflow_dispatch:

# 解决Node.js 20弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_daily_arxiv:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 写入DeepSeek密钥
        run: echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env

      - name: 运行主程序
        run: python main.py

      # 🔴 新增调试步骤：列出所有文件，确认是否生成
      - name: 查看生成的文件
        run: |
          echo "=== 项目根目录 ==="
          ls -la
          echo -e "\n=== data目录文件 ==="
          ls -laR data/ || echo "data目录不存在"

      - name: 上传报告文件
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-daily-report
          path: |
            data/summaries/
            data/papers/
          retention-days: 30
