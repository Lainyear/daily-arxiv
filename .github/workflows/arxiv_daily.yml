name: 每日ArXiv论文中文日报
on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1点 = 北京时间早上9点 自动运行
  workflow_dispatch:     # 支持手动一键测试（最常用）

jobs:
  run_daily_arxiv:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 写入 LLM 密钥（云端加密，绝不泄露）
        run: echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env

      - name: 运行主程序（爬论文 + AI总结 + 生成日报）
        run: python main.py

      - name: 上传生成的所有报告文件（可下载查看）
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-daily-report
          path: |
            data/summaries/    # AI总结+日报全部在这里
            data/papers/       # 原始论文数据
          retention-days: 30  # 文件保留30天
